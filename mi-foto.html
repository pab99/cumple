<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mi Foto del Cumpleaños</title>
<style>
* { box-sizing: border-box; }
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  padding: 0;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 20px 20px 10px;
  display: flex;
  justify-content: center;
}
header img {
  height: 90px;
}

main {
  flex: 1;
  padding: 10px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-size: 1.5rem;
  margin-bottom: 16px;
  color: gold;
}

.search-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

input {
  padding: 12px 16px;
  font-size: 18px;
  border: 2px solid gold;
  border-radius: 8px;
  background: #111;
  color: white;
  width: 220px;
  outline: none;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  background: gold;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:active { opacity: 0.8; }

#res { margin-top: 16px; width: 100%; }

#res img {
  max-width: 90vw;
  max-height: 60vh;
  border: 3px solid gold;
  border-radius: 8px;
  display: block;
  margin: 0 auto 12px;
}

.msg {
  color: #aaa;
  font-size: 16px;
  margin-top: 20px;
}

.spinner {
  margin: 20px auto;
  width: 36px;
  height: 36px;
  border: 4px solid #333;
  border-top-color: gold;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── LLAMA ── */
#globo-corner {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 140px;
  z-index: 90;
  pointer-events: none;
  opacity: 0;
  transform: translateY(100%);
}
#globo-corner svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 8px rgba(255,215,0,0.25)); }
@keyframes globoUp {
  0%   { opacity: 0; transform: translateY(100%); }
  15%  { opacity: 0.8; transform: translateY(0); }
  75%  { opacity: 0.8; transform: translateY(0); }
  90%  { opacity: 0; transform: translateY(30%); }
  100% { opacity: 0; transform: translateY(100%); }
}
#globo-corner.visible { animation: globoUp 5s ease forwards; }

footer {
  padding: 10px;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  letter-spacing: 1px;
}
</style>
</head>

<body>

<header>
  <img src="assets/logo_catamarca_gobierno_c_blanca.png" alt="Cumpleaños Gobierno" />
</header>

<main>

<h1>⛏️ TU FOTO MINERA</h1>

<div class="search-row">
  <input id="ig" placeholder="@usuario" type="text" autocomplete="off" autocapitalize="none" />
  <button onclick="buscar()">Buscar</button>
</div>

<div id="res"></div>

</main>

<footer>® Tecnoincas 2026</footer>

<div id="globo-corner">

<script>
const res = document.getElementById('res');

// Enter también busca
document.getElementById('ig').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscar();
});

// Globo: aparece cada 18s
const globo = document.getElementById('globo-corner');
function showGlobo() {
  globo.classList.remove('visible');
  void globo.offsetWidth;
  globo.classList.add('visible');
}
setTimeout(showGlobo, 5000);
setInterval(showGlobo, 18000);

async function buscar() {
  const raw = document.getElementById('ig').value;
  const ig = raw.replace('@', '').trim().toLowerCase();

  if (!ig) {
    res.innerHTML = '<p class="msg">Ingresá tu usuario de Instagram</p>';
    return;
  }

  res.innerHTML = '<div class="spinner"></div>';

  try {
    const r = await fetch('/api/buscar?ig=' + encodeURIComponent(ig));
    const json = await r.json();

    res.innerHTML = '';

    if (!json.ok) {
      res.innerHTML = '<p class="msg">Error del servidor</p>';
      return;
    }

    if (!json.fotos || json.fotos.length === 0) {
      res.innerHTML = '<p class="msg">No se encontró foto para @' + ig + '</p>';
      return;
    }

    json.fotos.forEach((f, i) => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'margin-bottom:28px; display:flex; flex-direction:column; align-items:center;';

      const img = document.createElement('img');
      img.src = f.public_url;
      img.alt = 'Foto de @' + ig;
      img.crossOrigin = 'anonymous';

      // Botones
      const btnRow = document.createElement('div');
      btnRow.style.cssText = 'display:flex; gap:8px; flex-wrap:nowrap; justify-content:center; margin-top:12px; width:100%;';

      // Descargar
      const btnDown = document.createElement('a');
      btnDown.href = f.public_url;
      btnDown.download = 'foto-minera-' + (i+1) + '.jpg';
      btnDown.target = '_blank';
      btnDown.textContent = '⬇ Descargar';
      btnDown.style.cssText = 'padding:10px 16px;background:#FFD700;color:#000;font-weight:bold;font-size:14px;border-radius:8px;text-decoration:none;white-space:nowrap;';
      btnDown.addEventListener('click', () => registrarDescarga(f.public_url, ig));

      btnRow.appendChild(btnDown);

      // Compartir
      if (typeof navigator.share === 'function') {
        const btnShare = document.createElement('button');
        btnShare.textContent = '↗ Compartir';
        btnShare.style.cssText = 'padding:10px 16px;background:#222;color:#FFD700;font-weight:bold;font-size:14px;border-radius:8px;border:2px solid #FFD700;cursor:pointer;white-space:nowrap;';
        btnShare.addEventListener('click', async () => {
          try {
            const resp = await fetch(f.public_url);
            const blob = await resp.blob();
            const file = new File([blob], 'foto-minera.jpg', { type: 'image/jpeg' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ title: '⛏️ Mi Foto del Cumpleaños', text: '¡Mirá mi foto del cumpleaños!', files: [file] });
            } else {
              await navigator.share({ title: '⛏️ Mi Foto del Cumpleaños', text: '¡Mirá mi foto del cumpleaños!', url: f.public_url });
            }
          } catch(e) { if (e.name !== 'AbortError') console.error(e); }
        });
        btnRow.appendChild(btnShare);
      }

      // Eliminar
      const btnDel = document.createElement('button');
      btnDel.textContent = '🗑 Eliminar';
      btnDel.style.cssText = 'padding:10px 16px;background:transparent;color:#888;font-size:14px;border-radius:8px;border:1px solid #444;cursor:pointer;white-space:nowrap;';
      let confirmando = false;
      btnDel.addEventListener('click', async () => {
        if (!confirmando) {
          confirmando = true;
          btnDel.textContent = '¿Confirmar borrado?';
          btnDel.style.cssText = 'padding:10px 16px;background:#500;color:#fff;font-size:13px;border-radius:8px;border:2px solid #f00;cursor:pointer;white-space:nowrap;';
          setTimeout(() => {
            if (confirmando) {
              confirmando = false;
              btnDel.textContent = '🗑 Eliminar';
              btnDel.style.cssText = 'padding:10px 16px;background:transparent;color:#888;font-size:14px;border-radius:8px;border:1px solid #444;cursor:pointer;white-space:nowrap;';
            }
          }, 5000);
        } else {
          btnDel.textContent = '...';
          btnDel.disabled = true;
          try {
            const r = await fetch('/api/ocultar', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ public_url: f.public_url, usuario_ig: ig })
            });
            const j = await r.json();
            if (j.ok) {
              wrap.innerHTML = '<p style="color:#888;font-size:14px;padding:20px;">✓ Foto eliminada.</p>';
            } else {
              btnDel.textContent = '🗑 Eliminar'; btnDel.disabled = false;
            }
          } catch(e) {
            btnDel.textContent = '🗑 Eliminar'; btnDel.disabled = false;
          }
        }
      });
      btnRow.appendChild(btnDel);

      wrap.appendChild(img);
      wrap.appendChild(btnRow);
      res.appendChild(wrap);
    });

  } catch (e) {
    res.innerHTML = '<p class="msg">Error de conexión</p>';
    console.error(e);
  }
}

async function registrarDescarga(url, ig) {
  try {
    await fetch('/api/descarga', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ public_url: url, usuario_ig: ig })
    });
  } catch(e) { /* silencioso */ }
}
</script>
