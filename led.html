<script>
const CTA_EVERY = 5;
const SLIDE_DURATION = 4000;
const CTA_DURATION = 15000;

let fotos = [];
let current = 0;
let slides = [];
let photoCount = 0;
let timer = null;
let ctaTimer = null;
let inCTA = false;

const carrousel = document.getElementById('carrousel');
const ctaScreen = document.getElementById('cta-screen');
const status = document.getElementById('status');

function buildSlides(data) {
  const urls = data.map(f => f.public_url).join(',');
  const prevUrls = fotos.map(f => f.public_url).join(',');
  if (urls === prevUrls) return;

  fotos = data;
  slides.forEach(s => s.remove());
  slides = [];
  if (timer) clearInterval(timer);
  if (ctaTimer) clearTimeout(ctaTimer);

  if (fotos.length === 0) return;

  fotos.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = f.public_url;
    div.appendChild(img);
    carrousel.appendChild(div);
    slides.push(div);
  });

  current = 0;
  photoCount = 0;
  scheduleNext();
}

function scheduleNext() {
  timer = setTimeout(() => {
    if (inCTA) return;
    photoCount++;
    if (photoCount > 0 && photoCount % CTA_EVERY === 0) {
      showCTA();
    } else {
      nextSlide();
      scheduleNext();
    }
  }, SLIDE_DURATION);
}

function nextSlide() {
  if (slides.length < 2) return;
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}

function showCTA() {
  inCTA = true;
  ctaScreen.classList.add('active');
  ctaTimer = setTimeout(() => {
    ctaScreen.classList.remove('active');
    inCTA = false;
    nextSlide();
    scheduleNext();
  }, CTA_DURATION);
}

async function load() {
  try {
    const res = await fetch('/api/fotos');
    const json = await res.json();
    if (!json.ok) return;
    buildSlides(json.fotos || []);
    status.textContent = (json.fotos?.length || 0) + ' fotos · ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

load();
setInterval(load, 5000);

// Globo: aparece cada 22 segundos
const globo = document.getElementById('globo-corner');
function showGlobo() {
  globo.classList.remove('visible');
  void globo.offsetWidth; // reflow para reiniciar animacion
  globo.classList.add('visible');
}
setTimeout(showGlobo, 15000); // primera vez a los 8s
setInterval(showGlobo, 22000);
</script>
